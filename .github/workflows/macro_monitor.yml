name: AI Macro Briefing Automation

on:
  schedule:
    # Test Slot 1: 10:02 AM IST (04:32 AM GMT)
    - cron: '32 4 * * 2'
    
    # Test Slot 2: 10:04 AM IST (04:34 AM GMT)
    - cron: '34 4 * * 2'
    
    # Test Slot 3: 10:06 AM IST (04:36 AM GMT)
    - cron: '36 4 * * 2'
    
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Script with Injected Secrets
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py
