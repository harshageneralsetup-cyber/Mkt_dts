name: AI Macro Briefing Automation

on:
  schedule:
    # Test Window 1: Triggers at 4:54 PM IST (11:24 UTC)
    - cron: '24 11 * * 1'
    
    # Test Window 2: Triggers at 4:56 PM IST (11:26 UTC)
    - cron: '26 11 * * 1'
    
    # Test Window 3: Triggers at 4:58 PM IST (11:28 UTC)
    - cron: '28 11 * * 1'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Script with Injected Secrets
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py
